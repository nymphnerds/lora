<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Easy LoRA</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@900&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    color-scheme: dark;
    --lime: #63e35f;
    --dark: #0d0d0d;
    --dark2: #161616;
    --dark3: #1e1e1e;
    --dark4: #2a2a2a;
    --muted: #888;
    --light: #f0ede6;
    --accent: #ff4d1c;
    --teal: #55dff0;
    --font-head: "Archivo", sans-serif;
    --font-mono: "DM Mono", monospace;
    --font-body: "Inter", sans-serif;
  }

  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at 86% 0%, rgba(85,223,240,0.18) 0%, transparent 30%),
      radial-gradient(circle at 12% 100%, rgba(99,227,95,0.10) 0%, transparent 28%),
      linear-gradient(180deg, #0a0d0b 0%, var(--dark) 54%, #0b0e0d 100%);
    color: var(--light);
    font-family: var(--font-body);
    font-weight: 400;
    overflow-x: hidden;
  }

  button,
  input,
  select { font: inherit; }

  button {
    min-height: 32px;
    border: 1px solid var(--dark4);
    border-radius: 5px;
    background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.018));
    color: var(--light);
    padding: 0 12px;
    font-size: 13px;
    font-weight: 700;
    white-space: normal;
    text-align: center;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }

  button:hover:not(:disabled) {
    border-color: rgba(85,223,240,0.42);
    color: #fff;
  }

  button.primary {
    border-color: transparent;
    background: linear-gradient(90deg, var(--lime) 0%, var(--teal) 100%);
    color: var(--dark);
    font-family: var(--font-head);
    font-weight: 900;
    box-shadow: 0 12px 28px rgba(85,223,240,0.18);
  }

  button.danger {
    color: #ff8c74;
    border-color: rgba(255,77,28,0.34);
  }

  button:disabled {
    color: #5f5f5f;
    background: #121212;
    border-color: #232323;
    box-shadow: none;
  }

  input[type="text"],
  select {
    width: 100%;
    min-width: 0;
    height: 34px;
    border: 1px solid var(--dark4);
    border-radius: 5px;
    background:
      linear-gradient(180deg, rgba(85,223,240,0.035), transparent),
      #101010;
    color: var(--light);
    padding: 0 10px;
    outline: none;
  }

  select {
    appearance: none;
    background-image:
      linear-gradient(45deg, transparent 50%, var(--muted) 50%),
      linear-gradient(135deg, var(--muted) 50%, transparent 50%);
    background-position: calc(100% - 15px) 14px, calc(100% - 10px) 14px;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
    padding-right: 30px;
  }

  input:focus,
  select:focus {
    border-color: rgba(85,223,240,0.66);
    box-shadow: 0 0 0 2px rgba(85,223,240,0.10);
  }

  .wrap {
    width: min(900px, calc(100vw - 28px));
    margin: 0 auto;
    padding: 18px 0;
    position: relative;
  }

  .wrap::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.014) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: linear-gradient(180deg, rgba(0,0,0,0.45), transparent 70%);
  }

  h1 {
    margin-bottom: 10px;
    font-family: var(--font-head);
    font-size: 40px;
    font-weight: 900;
    line-height: 0.94;
    color: #fff;
    text-shadow: 0 0 34px rgba(85,223,240,0.14);
  }

  h1 span {
    background: linear-gradient(90deg, var(--lime), var(--teal));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .panel {
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 5px;
    background:
      linear-gradient(180deg, rgba(85,223,240,0.045), transparent 38%),
      rgba(22,22,22,0.92);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.05),
      0 18px 46px rgba(0,0,0,0.32);
  }

  .form { padding: 11px; }

  .form::before {
    content: "AI TOOLKIT JOB BUILDER";
    display: inline-flex;
    margin-bottom: 9px;
    color: var(--teal);
    font: 11px/1 var(--font-mono);
    letter-spacing: 0.08em;
  }

  .row {
    display: grid;
    grid-template-columns: 104px minmax(0, 1fr) auto;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }

  label,
  .label {
    color: var(--light);
    font-size: 13px;
    font-weight: 700;
  }

  .button-row {
    display: flex;
    gap: 7px;
  }

  .pair {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 8px;
  }

  .tuning {
    display: grid;
    grid-template-columns: 1.35fr 0.8fr 0.88fr 0.72fr;
    gap: 8px;
    margin-top: 9px;
  }

  .field {
    display: grid;
    gap: 4px;
  }

  .field span {
    color: var(--teal);
    font: 11px/1.1 var(--font-mono);
    text-transform: uppercase;
  }

  .range-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 64px;
    gap: 8px;
    align-items: center;
  }

  input[type="range"] {
    width: 100%;
    accent-color: var(--lime);
  }

  .value {
    display: grid;
    place-items: center;
    height: 34px;
    border: 1px solid var(--dark4);
    border-radius: 5px;
    background: linear-gradient(180deg, rgba(85,223,240,0.10), rgba(99,227,95,0.04)), #111827;
    color: #fff;
    font: 12px/1 var(--font-mono);
  }

  .options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-top: 9px;
  }

  .check {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
  }

  input[type="checkbox"] {
    width: 15px;
    height: 15px;
    accent-color: var(--lime);
  }

  .hint {
    color: var(--teal);
    font: 11px/1 var(--font-mono);
    text-transform: uppercase;
  }

  .jobs {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 8px;
    margin-top: 10px;
  }

  .progress {
    margin-top: 10px;
    border: 1px solid var(--dark4);
    border-radius: 5px;
    background:
      linear-gradient(90deg, rgba(85,223,240,0.055), rgba(99,227,95,0.035)),
      #101010;
    padding: 9px;
    color: var(--muted);
    font-size: 12px;
  }

  .progress-head {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: center;
    margin-bottom: 7px;
  }

  .progress-head span {
    font-weight: 700;
    color: var(--light);
  }

  .progress-head strong {
    color: var(--teal);
    font-family: var(--font-mono);
    font-weight: 500;
  }

  .meter {
    height: 14px;
    overflow: hidden;
    border: 1px solid var(--dark4);
    border-radius: 100px;
    background: #090909;
    box-shadow: inset 0 0 18px rgba(0,0,0,0.85);
  }

  .fill {
    width: 0;
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--lime));
    box-shadow: 0 0 18px rgba(85,223,240,0.34);
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-top: 7px;
    font-family: var(--font-mono);
  }

  .finished {
    display: grid;
    gap: 5px;
    margin-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding-top: 9px;
    color: var(--muted);
    font-size: 12px;
  }

  .finished[hidden] { display: none; }

  .finished-head {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: baseline;
  }

  .finished-head strong {
    color: var(--lime);
    font-family: var(--font-head);
    font-size: 16px;
    line-height: 1;
  }

  .finished-head span,
  .finished-path,
  .finished-activation {
    font-family: var(--font-mono);
  }

  .finished-path {
    overflow-wrap: anywhere;
    color: #d8fff5;
  }

  .finished-activation {
    color: var(--light);
  }

  .log { margin-top: 10px; }

  .log-head {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: center;
    padding: 9px 10px 0;
  }

  .log-head strong {
    font-family: var(--font-head);
    font-size: 18px;
    line-height: 1;
  }

  .log-head span {
    color: var(--muted);
    font: 11px/1 var(--font-mono);
  }

  pre {
    height: 104px;
    overflow: auto;
    margin: 8px 10px 10px;
    border: 1px solid var(--dark4);
    border-radius: 5px;
    background:
      linear-gradient(180deg, rgba(85,223,240,0.035), transparent),
      #080808;
    color: #d8fff5;
    padding: 9px 10px;
    font: 12px/1.42 var(--font-mono);
  }

  @media (max-width: 860px) {
    .wrap {
      width: min(760px, calc(100vw - 20px));
      padding: 12px 0;
    }

    .row {
      grid-template-columns: 96px minmax(0, 1fr);
    }

    .row > .button-row,
    .row > button,
    .row > span:empty {
      grid-column: 2;
    }

    .tuning {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .jobs {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 560px) {
    .row,
    .pair,
    .tuning,
    .jobs {
      grid-template-columns: 1fr;
    }

    .wrap {
      width: calc(100vw - 16px);
      padding: 10px 0;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .form {
      padding: 9px;
    }

    .row {
      gap: 6px;
      margin-bottom: 9px;
    }

    .row > .button-row,
    .row > button,
    .row > span:empty {
      grid-column: auto;
    }

    .button-row,
    .options { flex-wrap: wrap; }

    .button-row button,
    .jobs button {
      width: 100%;
    }

    .options {
      align-items: flex-start;
    }

    .progress-head,
    .progress-meta { flex-wrap: wrap; }
  }
</style>
</head>
<body>
  <main class="wrap">
    <h1>Easy <span>LoRA</span></h1>

    <section class="panel form" aria-label="Easy LoRA controls">
      <div class="row">
        <label for="lora-name">LoRA name</label>
        <input id="lora-name" type="text" value="my_first_lora">
        <div class="button-row">
          <button id="open-pictures" type="button">Open Pictures</button>
        </div>
      </div>

      <div class="row">
        <span class="label">Captions</span>
        <div class="pair">
          <select id="caption-mode" aria-label="Caption fill mode">
            <option value="fill_blanks">Fill Blank Only</option>
            <option value="overwrite_all">Overwrite All Drafts</option>
          </select>
          <button id="caption-brain" type="button">Caption with Brain</button>
        </div>
        <button id="open-captions" type="button">Open Captions</button>
      </div>

      <div class="row">
        <span class="label">Training</span>
        <div class="pair">
          <select id="preset" aria-label="Preset">
            <option value="baseline">Character</option>
            <option value="style">Style</option>
            <option value="strong_style">Strong Style</option>
            <option value="fast_test">Fast Test</option>
          </select>
          <select id="adapter" aria-label="Training adapter">
            <option value="v1">v1 (Recommended)</option>
            <option value="v2">v2 (Experimental)</option>
          </select>
        </div>
        <span></span>
      </div>

      <div class="row">
        <label for="sample-prompt">Sample prompt</label>
        <input id="sample-prompt" type="text" maxlength="160" placeholder="Optional">
        <span></span>
      </div>

      <div class="tuning">
        <div class="field">
          <span>Steps</span>
          <div class="range-row">
            <input id="steps" type="range" min="500" max="6000" step="100" value="3000">
            <output class="value" for="steps">3000</output>
          </div>
        </div>
        <label class="field">
          <span>Checkpoints</span>
          <select id="checkpoints"><option value="4">4</option><option value="2">2</option><option value="8">8</option></select>
        </label>
        <label class="field">
          <span>Learning rate</span>
          <select id="learning-rate"><option value="1e-4">1e-4</option><option value="5e-5">5e-5</option><option value="2e-4">2e-4</option></select>
        </label>
        <label class="field">
          <span>LoRA rank</span>
          <select id="rank"><option value="16">16</option><option value="8">8</option><option value="32">32</option></select>
        </label>
      </div>

      <div class="options">
        <label class="check"><input id="low-vram" type="checkbox">Low VRAM mode</label>
        <span class="hint">Checkpoint every 750 steps</span>
      </div>

      <div class="jobs">
        <button id="create-job" type="button">Create Job</button>
        <button id="start-job" class="primary" type="button">Start Training</button>
        <button id="stop-job" type="button">Stop Job</button>
        <button id="delete-job" class="danger" type="button">Delete Job</button>
        <button id="job-status" type="button">Status</button>
      </div>

      <div id="progress" class="progress" role="progressbar" aria-label="Training progress" aria-valuemin="0" aria-valuemax="3000" aria-valuenow="0">
        <div class="progress-head">
          <span>Training progress</span>
          <strong id="progress-percent">0%</strong>
        </div>
        <div class="meter"><div id="progress-fill" class="fill"></div></div>
        <div class="progress-meta">
          <span id="progress-steps">0 / 0 steps</span>
          <span id="progress-state">Idle</span>
        </div>
      </div>

      <div id="finished-summary" class="finished" hidden>
        <div class="finished-head">
          <strong id="finished-title">Finished LoRA</strong>
          <span id="finished-meta"></span>
        </div>
        <div id="finished-path" class="finished-path"></div>
        <div id="finished-activation" class="finished-activation"></div>
      </div>
    </section>

    <section class="panel log">
      <div class="log-head">
        <strong>Live log</strong>
        <span>current Easy LoRA job</span>
      </div>
      <pre id="log-output">Checking Easy LoRA status...</pre>
    </section>
  </main>

  <script>
    const steps = document.querySelector("#steps");
    const output = document.querySelector("output[for='steps']");
    const loraName = document.querySelector("#lora-name");
    const openPictures = document.querySelector("#open-pictures");
    const openCaptions = document.querySelector("#open-captions");
    const captionBrain = document.querySelector("#caption-brain");
    const captionMode = document.querySelector("#caption-mode");
    const preset = document.querySelector("#preset");
    const adapter = document.querySelector("#adapter");
    const samplePrompt = document.querySelector("#sample-prompt");
    const checkpoints = document.querySelector("#checkpoints");
    const learningRate = document.querySelector("#learning-rate");
    const rank = document.querySelector("#rank");
    const lowVram = document.querySelector("#low-vram");
    const createJob = document.querySelector("#create-job");
    const startJob = document.querySelector("#start-job");
    const stopJob = document.querySelector("#stop-job");
    const deleteJob = document.querySelector("#delete-job");
    const jobStatus = document.querySelector("#job-status");
    const progress = document.querySelector("#progress");
    const progressPercent = document.querySelector("#progress-percent");
    const progressFill = document.querySelector("#progress-fill");
    const progressSteps = document.querySelector("#progress-steps");
    const progressState = document.querySelector("#progress-state");
    const finishedSummary = document.querySelector("#finished-summary");
    const finishedTitle = document.querySelector("#finished-title");
    const finishedMeta = document.querySelector("#finished-meta");
    const finishedPath = document.querySelector("#finished-path");
    const finishedActivation = document.querySelector("#finished-activation");
    const logOutput = document.querySelector("#log-output");
    let requestId = 0;
    let statusInFlight = false;
    let formHydrated = false;
    let formEdited = false;
    const pendingRequests = new Map();

    function normalizeActionName(value) {
      const normalized = String(value || "")
        .trim()
        .replace(/\s+/g, "_")
        .replace(/[^A-Za-z0-9_-]/g, "")
        .replace(/^[_-]+|[_-]+$/g, "");
      return normalized || "my_first_lora";
    }

    function runModuleAction(action, params = {}) {
      const name = normalizeActionName(loraName.value);
      const query = new URLSearchParams({ "lora-name": name });
      for (const [key, value] of Object.entries(params)) {
        query.set(key, value);
      }
      window.location.href = `nymphs-module-action://${action}?${query.toString()}`;
    }

    function moduleAction(action, params = {}) {
      if (!window.chrome || !window.chrome.webview) {
        runModuleAction(action, params);
        return Promise.resolve("");
      }

      const id = `easy-lora-${++requestId}`;
      const args = { "lora-name": normalizeActionName(loraName.value), ...params };
      return new Promise((resolve, reject) => {
        pendingRequests.set(id, { resolve, reject });
        window.chrome.webview.postMessage({
          type: "module_action",
          requestId: id,
          action,
          args
        });
      });
    }

    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.addEventListener("message", event => {
        const message = event.data || {};
        if (message.type !== "module_action_result") {
          return;
        }
        const pending = pendingRequests.get(message.requestId);
        if (!pending) {
          return;
        }
        pendingRequests.delete(message.requestId);
        if (message.ok) {
          pending.resolve(message.output || "");
        } else {
          pending.reject(new Error(message.error || "Module action failed."));
        }
      });
    }

    function parseKeyValues(output) {
      const values = {};
      for (const line of String(output || "").split(/\r?\n/)) {
        const index = line.indexOf("=");
        if (index <= 0) {
          continue;
        }
        values[line.slice(0, index)] = line.slice(index + 1);
      }
      return values;
    }

    function intValue(value, fallback = 0) {
      const parsed = Number.parseInt(value, 10);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function formatBytes(value) {
      const bytes = intValue(value);
      if (bytes <= 0) {
        return "";
      }
      const units = ["B", "KB", "MB", "GB"];
      let size = bytes;
      let unit = 0;
      while (size >= 1024 && unit < units.length - 1) {
        size /= 1024;
        unit += 1;
      }
      return `${size >= 10 || unit === 0 ? size.toFixed(0) : size.toFixed(1)} ${units[unit]}`;
    }

    function formatDate(value) {
      if (!value) {
        return "";
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return "";
      }
      return date.toLocaleString();
    }

    function latestFinished(values) {
      if (values.finished_loras_json) {
        try {
          const items = JSON.parse(values.finished_loras_json);
          if (Array.isArray(items) && items.length > 0) {
            return items[0];
          }
        } catch {
        }
      }
      if (!values.latest_finished_lora) {
        return null;
      }
      return {
        display_name: values.latest_finished_lora_name,
        path: values.latest_finished_lora,
        size: values.latest_finished_lora_size,
        modified: values.latest_finished_lora_modified
      };
    }

    function applyFinishedSummary(values) {
      const hasSelectedFinal = values.final_checkpoint_exists === "true";
      const selected = hasSelectedFinal ? {
        label: "Finished",
        name: values.display_name || values.normalized_name || "LoRA",
        path: values.final_checkpoint,
        size: values.final_checkpoint_size,
        modified: values.final_checkpoint_modified,
        activation: values.activation_text
      } : null;
      const latest = latestFinished(values);
      const item = selected || (latest ? {
        label: "Latest finished",
        name: latest.display_name || latest.name || values.latest_finished_lora_name || "LoRA",
        path: latest.path || values.latest_finished_lora || "",
        size: latest.size || values.latest_finished_lora_size,
        modified: latest.modified || values.latest_finished_lora_modified,
        activation: latest.activation_text || ""
      } : null);

      if (!item || !item.path) {
        finishedSummary.hidden = true;
        return;
      }

      const count = intValue(values.finished_lora_count);
      const pieces = [formatBytes(item.size), formatDate(item.modified)];
      if (count > 0) {
        pieces.push(`${count} finished total`);
      }
      finishedSummary.hidden = false;
      finishedTitle.textContent = `${item.label}: ${item.name}`;
      finishedMeta.textContent = pieces.filter(Boolean).join(" | ");
      finishedPath.textContent = item.path;
      finishedActivation.textContent = item.activation ? `Activation: ${item.activation}` : "Activation text not saved.";
    }

    function setSelectValue(select, value, label = value) {
      if (!value) {
        return;
      }
      const exists = Array.from(select.options).some(option => option.value === value);
      if (!exists) {
        select.add(new Option(label, value));
      }
      select.value = value;
    }

    function setRangeValue(range, value) {
      const parsed = intValue(value, intValue(range.value));
      const min = intValue(range.min, parsed);
      const max = intValue(range.max, parsed);
      const clamped = Math.max(min, Math.min(max, parsed));
      range.value = String(clamped);
      output.textContent = range.value;
    }

    function samplePromptFromStatus(values) {
      if (!values.form_sample_prompt_json) {
        return "";
      }
      try {
        return JSON.parse(values.form_sample_prompt_json);
      } catch {
        return values.form_sample_prompt_json;
      }
    }

    function applyFormSettings(values) {
      if (formHydrated || formEdited || values.form_settings_exists !== "true") {
        return;
      }

      setSelectValue(preset, values.form_preset, values.form_preset);
      setSelectValue(adapter, values.form_adapter, values.form_adapter);
      setRangeValue(steps, values.form_steps);
      setSelectValue(checkpoints, values.form_checkpoints);
      setSelectValue(learningRate, values.form_learning_rate);
      setSelectValue(rank, values.form_rank);
      lowVram.checked = values.form_low_vram === "true";
      samplePrompt.value = samplePromptFromStatus(values);
      formHydrated = true;
    }

    function applyStatus(values) {
      const percent = Math.max(0, Math.min(100, intValue(values.progress_percent)));
      const current = intValue(values.progress_current);
      const total = intValue(values.progress_total);
      const state = values.progress_text || values.job_status || "Idle";
      const jobState = values.job_status ? `AI Toolkit: ${values.job_status}` : values.api_running === "true" ? "AI Toolkit ready" : "AI Toolkit closed";
      let logTail = "";

      if (values.log_tail_json) {
        try {
          logTail = JSON.parse(values.log_tail_json);
        } catch {
          logTail = values.log_tail_json;
        }
      }

      progress.setAttribute("aria-valuenow", String(current || percent));
      progress.setAttribute("aria-valuemax", String(total || 100));
      progressPercent.textContent = `${percent}%`;
      progressFill.style.width = `${percent}%`;
      progressSteps.textContent = total > 0 ? `${current} / ${total} steps` : "No steps yet";
      progressState.textContent = jobState;
      applyFormSettings(values);
      applyFinishedSummary(values);
      logOutput.textContent = `${state}\n${logTail || "No live log available yet."}`;
    }

    async function refreshStatus() {
      if (statusInFlight) {
        return;
      }
      statusInFlight = true;
      try {
        const output = await moduleAction("job_status");
        applyStatus(parseKeyValues(output));
      } catch (error) {
        logOutput.textContent = error.message || String(error);
      } finally {
        statusInFlight = false;
      }
    }

    function captionFocus() {
      return preset.value === "style" || preset.value === "strong_style" ? "style" : "character";
    }

    function encodeUtf8Base64(value) {
      const bytes = new TextEncoder().encode(value);
      let binary = "";
      for (const byte of bytes) {
        binary += String.fromCharCode(byte);
      }
      return btoa(binary);
    }

    function createJobParams() {
      const params = {
        preset: preset.value,
        adapter: adapter.value,
        steps: steps.value,
        checkpoints: checkpoints.value,
        "learning-rate": learningRate.value,
        rank: rank.value,
        "low-vram": lowVram.checked ? "true" : "false"
      };
      const prompt = samplePrompt.value.trim();
      if (prompt) {
        const encodedPrompt = encodeUtf8Base64(prompt);
        if (encodedPrompt.length <= 256) {
          params["sample-prompt-b64"] = encodedPrompt;
        }
      }
      return params;
    }

    steps.addEventListener("input", () => {
      output.textContent = steps.value;
    });
    for (const control of [preset, adapter, steps, checkpoints, learningRate, rank, lowVram, samplePrompt, captionMode]) {
      control.addEventListener("input", () => {
        formEdited = true;
      });
      control.addEventListener("change", () => {
        formEdited = true;
      });
    }
    loraName.addEventListener("input", () => {
      formHydrated = false;
      formEdited = false;
    });
    openPictures.addEventListener("click", () => runModuleAction("open_pictures"));
    openCaptions.addEventListener("click", () => runModuleAction("open_captions"));
    captionBrain.addEventListener("click", () => runModuleAction("caption_brain", {
      "caption-mode": captionMode.value,
      "training-focus": captionFocus()
    }));
    createJob.addEventListener("click", () => runModuleAction("create_job", createJobParams()));
    startJob.addEventListener("click", () => runModuleAction("start_job"));
    stopJob.addEventListener("click", () => runModuleAction("stop_job"));
    deleteJob.addEventListener("click", () => runModuleAction("delete_job"));
    jobStatus.addEventListener("click", refreshStatus);
    refreshStatus();
    setInterval(refreshStatus, 5000);
  </script>
</body>
</html>
