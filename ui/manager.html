<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Easy LoRA</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@900&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    color-scheme: dark;
    --lime: #63e35f;
    --dark: #0d0d0d;
    --dark2: #161616;
    --dark3: #1e1e1e;
    --dark4: #2a2a2a;
    --muted: #888;
    --light: #f0ede6;
    --accent: #ff4d1c;
    --teal: #55dff0;
    --font-head: "Archivo", sans-serif;
    --font-mono: "DM Mono", monospace;
    --font-body: "Inter", sans-serif;
  }

  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at 86% 0%, rgba(85,223,240,0.18) 0%, transparent 30%),
      radial-gradient(circle at 12% 100%, rgba(99,227,95,0.10) 0%, transparent 28%),
      linear-gradient(180deg, #0a0d0b 0%, var(--dark) 54%, #0b0e0d 100%);
    color: var(--light);
    font-family: var(--font-body);
    font-weight: 400;
    overflow-x: hidden;
  }

  button,
  input,
  select { font: inherit; }

  button {
    min-height: 32px;
    border: 1px solid var(--dark4);
    border-radius: 5px;
    background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.018));
    color: var(--light);
    padding: 0 12px;
    font-size: 13px;
    font-weight: 700;
    white-space: normal;
    text-align: center;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }

  button:hover:not(:disabled) {
    border-color: rgba(85,223,240,0.42);
    color: #fff;
  }

  button.primary {
    border-color: transparent;
    background: linear-gradient(90deg, var(--lime) 0%, var(--teal) 100%);
    color: var(--dark);
    font-family: var(--font-head);
    font-weight: 900;
    box-shadow: 0 12px 28px rgba(85,223,240,0.18);
  }

  button.danger {
    color: #ff8c74;
    border-color: rgba(255,77,28,0.34);
  }

  button:disabled {
    color: #5f5f5f;
    background: #121212;
    border-color: #232323;
    box-shadow: none;
  }

  input[type="text"],
  select {
    width: 100%;
    min-width: 0;
    height: 34px;
    border: 1px solid var(--dark4);
    border-radius: 5px;
    background:
      linear-gradient(180deg, rgba(85,223,240,0.035), transparent),
      #101010;
    color: var(--light);
    padding: 0 10px;
    outline: none;
  }

  select {
    appearance: none;
    background-image:
      linear-gradient(45deg, transparent 50%, var(--muted) 50%),
      linear-gradient(135deg, var(--muted) 50%, transparent 50%);
    background-position: calc(100% - 15px) 14px, calc(100% - 10px) 14px;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
    padding-right: 30px;
  }

  input:focus,
  select:focus {
    border-color: rgba(85,223,240,0.66);
    box-shadow: 0 0 0 2px rgba(85,223,240,0.10);
  }

  .wrap {
    width: min(900px, calc(100vw - 28px));
    margin: 0 auto;
    padding: 18px 0;
    position: relative;
  }

  .wrap::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.014) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: linear-gradient(180deg, rgba(0,0,0,0.45), transparent 70%);
  }

  h1 {
    margin-bottom: 10px;
    font-family: var(--font-head);
    font-size: 40px;
    font-weight: 900;
    line-height: 0.94;
    color: #fff;
    text-shadow: 0 0 34px rgba(85,223,240,0.14);
  }

  h1 span {
    background: linear-gradient(90deg, var(--lime), var(--teal));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .panel {
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 5px;
    background:
      linear-gradient(180deg, rgba(85,223,240,0.045), transparent 38%),
      rgba(22,22,22,0.92);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.05),
      0 18px 46px rgba(0,0,0,0.32);
  }

  .form { padding: 11px; }

  .form::before {
    content: "AI TOOLKIT JOB BUILDER";
    display: inline-flex;
    margin-bottom: 9px;
    color: var(--teal);
    font: 11px/1 var(--font-mono);
    letter-spacing: 0.08em;
  }

  .row {
    display: grid;
    grid-template-columns: 104px minmax(0, 1fr) auto;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }

  label,
  .label {
    color: var(--light);
    font-size: 13px;
    font-weight: 700;
  }

  .button-row {
    display: flex;
    gap: 7px;
  }

  .pair {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 8px;
  }

  .tuning {
    display: grid;
    grid-template-columns: 1.35fr 0.8fr 0.88fr 0.72fr;
    gap: 8px;
    margin-top: 9px;
  }

  .field {
    display: grid;
    gap: 4px;
  }

  .field span {
    color: var(--teal);
    font: 11px/1.1 var(--font-mono);
    text-transform: uppercase;
  }

  .range-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 64px;
    gap: 8px;
    align-items: center;
  }

  input[type="range"] {
    width: 100%;
    accent-color: var(--lime);
  }

  .value {
    display: grid;
    place-items: center;
    height: 34px;
    border: 1px solid var(--dark4);
    border-radius: 5px;
    background: linear-gradient(180deg, rgba(85,223,240,0.10), rgba(99,227,95,0.04)), #111827;
    color: #fff;
    font: 12px/1 var(--font-mono);
  }

  .options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-top: 9px;
  }

  .check {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
  }

  input[type="checkbox"] {
    width: 15px;
    height: 15px;
    accent-color: var(--lime);
  }

  .hint {
    color: var(--teal);
    font: 11px/1 var(--font-mono);
    text-transform: uppercase;
  }

  .jobs {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
    margin-top: 10px;
  }

  .progress {
    margin-top: 10px;
    border: 1px solid var(--dark4);
    border-radius: 5px;
    background:
      linear-gradient(90deg, rgba(85,223,240,0.055), rgba(99,227,95,0.035)),
      #101010;
    padding: 9px;
    color: var(--muted);
    font-size: 12px;
  }

  .progress-head {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: center;
    margin-bottom: 7px;
  }

  .progress-head span {
    font-weight: 700;
    color: var(--light);
  }

  .progress-head strong {
    color: var(--teal);
    font-family: var(--font-mono);
    font-weight: 500;
  }

  .meter {
    height: 14px;
    overflow: hidden;
    border: 1px solid var(--dark4);
    border-radius: 100px;
    background: #090909;
    box-shadow: inset 0 0 18px rgba(0,0,0,0.85);
  }

  .fill {
    width: 18%;
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--lime));
    box-shadow: 0 0 18px rgba(85,223,240,0.34);
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-top: 7px;
    font-family: var(--font-mono);
  }

  .log { margin-top: 10px; }

  .log-head {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: center;
    padding: 9px 10px 0;
  }

  .log-head strong {
    font-family: var(--font-head);
    font-size: 18px;
    line-height: 1;
  }

  .log-head span {
    color: var(--muted);
    font: 11px/1 var(--font-mono);
  }

  pre {
    height: 104px;
    overflow: auto;
    margin: 8px 10px 10px;
    border: 1px solid var(--dark4);
    border-radius: 5px;
    background:
      linear-gradient(180deg, rgba(85,223,240,0.035), transparent),
      #080808;
    color: #d8fff5;
    padding: 9px 10px;
    font: 12px/1.42 var(--font-mono);
  }

  @media (max-width: 860px) {
    .wrap {
      width: min(760px, calc(100vw - 20px));
      padding: 12px 0;
    }

    .row {
      grid-template-columns: 96px minmax(0, 1fr);
    }

    .row > .button-row,
    .row > button,
    .row > span:empty {
      grid-column: 2;
    }

    .tuning {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .jobs {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 560px) {
    .row,
    .pair,
    .tuning,
    .jobs {
      grid-template-columns: 1fr;
    }

    .wrap {
      width: calc(100vw - 16px);
      padding: 10px 0;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .form {
      padding: 9px;
    }

    .row {
      gap: 6px;
      margin-bottom: 9px;
    }

    .row > .button-row,
    .row > button,
    .row > span:empty {
      grid-column: auto;
    }

    .button-row,
    .options { flex-wrap: wrap; }

    .button-row button,
    .jobs button {
      width: 100%;
    }

    .options {
      align-items: flex-start;
    }

    .progress-head,
    .progress-meta { flex-wrap: wrap; }
  }
</style>
</head>
<body>
  <main class="wrap">
    <h1>Easy <span>LoRA</span></h1>

    <section class="panel form" aria-label="Easy LoRA controls">
      <div class="row">
        <label for="lora-name">LoRA name</label>
        <input id="lora-name" type="text" value="my_first_lora">
        <div class="button-row">
          <button>Open Pictures</button>
        </div>
      </div>

      <div class="row">
        <span class="label">Captions</span>
        <div class="pair">
          <select aria-label="Caption fill mode">
            <option>Optional: Fill Blank Only</option>
            <option>Optional: Overwrite Empty + Draft</option>
            <option>Optional: Overwrite All</option>
          </select>
          <button>Caption with Brain</button>
        </div>
        <button>Open Captions</button>
      </div>

      <div class="row">
        <span class="label">Training</span>
        <div class="pair">
          <select aria-label="Preset">
            <option>Baseline</option>
            <option>Style</option>
            <option>Character</option>
          </select>
          <select aria-label="Training adapter">
            <option>v1 (Recommended)</option>
            <option>v2 (Experimental)</option>
          </select>
        </div>
        <span></span>
      </div>

      <div class="row">
        <label for="sample-prompt">Sample prompt</label>
        <input id="sample-prompt" type="text" placeholder="Optional">
        <span></span>
      </div>

      <div class="tuning">
        <div class="field">
          <span>Steps</span>
          <div class="range-row">
            <input id="steps" type="range" min="500" max="6000" step="100" value="3000">
            <output class="value" for="steps">3000</output>
          </div>
        </div>
        <label class="field">
          <span>Checkpoints</span>
          <select><option>4</option><option>2</option><option>8</option></select>
        </label>
        <label class="field">
          <span>Learning rate</span>
          <select><option>1e-4</option><option>5e-5</option><option>2e-4</option></select>
        </label>
        <label class="field">
          <span>LoRA rank</span>
          <select><option>16</option><option>8</option><option>32</option></select>
        </label>
      </div>

      <div class="options">
        <label class="check"><input type="checkbox">Low VRAM mode</label>
        <span class="hint">Checkpoint every 750 steps</span>
      </div>

      <div class="jobs">
        <button>Create Job</button>
        <button class="primary" disabled>Start Training</button>
        <button disabled>Stop Job</button>
        <button class="danger" disabled>Delete Job</button>
      </div>

      <div class="progress" role="progressbar" aria-label="Training progress" aria-valuemin="0" aria-valuemax="3000" aria-valuenow="540">
        <div class="progress-head">
          <span>Training progress</span>
          <strong>18%</strong>
        </div>
        <div class="meter"><div class="fill"></div></div>
        <div class="progress-meta">
          <span>540 / 3000 steps</span>
          <span>Preview state</span>
        </div>
      </div>
    </section>

    <section class="panel log">
      <div class="log-head">
        <strong>Live log</strong>
        <span>current Easy LoRA job</span>
      </div>
      <pre>Easy LoRA status check completed.
No job created yet.</pre>
    </section>
  </main>

  <script>
    const steps = document.querySelector("#steps");
    const output = document.querySelector("output[for='steps']");
    steps.addEventListener("input", () => {
      output.textContent = steps.value;
    });
  </script>
</body>
</html>
